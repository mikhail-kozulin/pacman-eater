<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 220px; font-family: -apple-system, sans-serif; padding: 12px; margin: 0; }
    h3 { margin: 0 0 8px 0; font-size: 14px; }
    p { margin: 0 0 12px 0; font-size: 12px; color: #555; line-height: 1.4; }
    button { width: 100%; padding: 10px; border: 0; background: #FFCC00; color: #000; font-weight: 600; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #ffd633; }
    .hint { margin-top: 10px; font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <h3>🟡 Pacman Eater</h3>
  <p>Сожри интерфейс этого сайта раньше бота.</p>
  <button id="start">Запустить пакмана</button>
  <div class="hint">Управление: WASD или ← ↑ → ↓ &nbsp;·&nbsp; Esc — выход</div>
  <script src="popup.js"></script>
</body>
</html>
